<!-- ROW 2: Sales Performance Trend -->
<section class="col-span-9 bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col" data-purpose="sales-trend">

      <button class="px-3 py-1 text-xs font-bold rounded-lg bg-gray-100 text-gray-500" data-range="week" onclick="switchTrendRange('week')">週</button>
      <button class="px-3 py-1 text-xs font-bold rounded-lg bg-primary text-white" data-range="month" onclick="switchTrendRange('month')">月</button>

<!-- Charts Script -->
<script>
    // Sales Performance Trend - Line Chart
    const trendData = {
      'week':  { labels: ['月','火','水','木','金'], data: [28, 32, 25, 35, 30] },
      'month': { labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], data: [70, 93, 85, 101, 92, 105, 77, 91, 82, 110, 95, 89] },
      'year':  { labels: ['2020','2021','2022','2023','2024'], data: [400, 370, 495, 460, 500] },
    };
    let currentTrendRange = 'month';

    function switchTrendRange(range) {
      currentTrendRange = range;
      document.querySelectorAll('#trendBtns button').forEach(btn => {
        if (btn.dataset.range === range) {
          btn.className = 'px-3 py-1 text-xs font-bold rounded-lg bg-primary text-white';
        } else {
          btn.className = 'px-3 py-1 text-xs font-bold rounded-lg bg-gray-100 text-gray-500';
        }
      });
      if (salesTrendInstance) {
        const d = trendData[currentTrendRange];
        salesTrendInstance.data.labels = d.labels;
        salesTrendInstance.data.datasets[0].data = d.data;
        salesTrendInstance.update();
        return;
      }
      drawSalesTrend('salesTrendChart');
    }

    let salesTrendInstance = null;
    function drawSalesTrend(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      if (salesTrendInstance) salesTrendInstance.destroy();
      const d = trendData[currentTrendRange];
      salesTrendInstance = new Chart(canvas, {
        type: 'line',
        data: {
          labels: d.labels,
          datasets: [{
            label: '売上',
            data: d.data,
            borderColor: '#30a1af',
            backgroundColor: function(context) {
              const chart = context.chart;
              const { ctx, chartArea } = chart;
              if (!chartArea) return 'rgba(48,161,175,0.1)';
              const grad = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
              grad.addColorStop(0, 'rgba(48, 161, 175, 0.2)');
              grad.addColorStop(1, 'rgba(48, 161, 175, 0)');
              return grad;
            },
            fill: true,
            tension: 0.4,
            borderWidth: 3,
            pointBackgroundColor: '#30a1af',
            pointRadius: 4,
            pointHoverRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ctx.parsed.y + ' 食/日'
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                color: '#9ca3af',
                font: { size: 14 }
              },
              grid: { color: '#f3f4f6' }
            },
            x: {
              ticks: {
                color: '#9ca3af',
                font: { size: 14 }
              },
              grid: { display: false }
            }
          }
        }
      });
    }

    // Nutritional Breakdown - Radar Chart
    let nutritionalInstance = null;
    function drawNutritionalChart(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      if (nutritionalInstance) nutritionalInstance.destroy();
      nutritionalInstance = new Chart(canvas, {
        type: 'radar',
        data: {
          labels: ['たんぱく質', '炭水化物', '脂質', '食物繊維', 'ナトリウム', 'ビタミン'],
          datasets: [{
            label: '栄養プロフィール',
            data: [85, 60, 45, 70, 40, 75],
            backgroundColor: 'rgba(48, 161, 175, 0.2)',
            borderColor: '#30a1af',
            borderWidth: 2,
            pointBackgroundColor: '#30a1af',
            pointRadius: 4,
            pointHoverRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: {
                stepSize: 25,
                display: false
              },
              grid: {
                color: '#e5e7eb'
              },
              angleLines: {
                color: '#e5e7eb'
              },
              pointLabels: {
                font: { size: 14, weight: 'bold' },
                color: '#6b7280'
              }
            }
          }
        }
      });
    }

    // Purchase Composition - Doughnut Chart
    let compositionInstance = null;
    function drawCompositionChart(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      if (compositionInstance) compositionInstance.destroy();
      compositionInstance = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: ['セット', '単品'],
          datasets: [{
            data: [65, 35],
            backgroundColor: ['#30a1af', '#e5e7eb'],
            borderWidth: 0,
          }]
        },
        options: {
          responsive: false,
          cutout: '70%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ctx.label + ': ' + ctx.parsed + '%'
              }
            }
          }
        }
      });
    }

    window.onload = () => {
      loadHeader();
      loadSidebar('items');
      drawSalesTrend('salesTrendChart');
      drawNutritionalChart('nutritionalChart');
      drawCompositionChart('compositionChart');
    };

    window.onresize = () => {
      drawSalesTrend('salesTrendChart');
      drawNutritionalChart('nutritionalChart');
      drawCompositionChart('compositionChart');
    };
  </script>
</body></html>
