<!-- Charts Script -->
<script>
    Chart.defaults.responsive = false;
    Chart.register(ChartDataLabels);
    Chart.defaults.plugins.datalabels = { display: false };

    function sizeCanvas(canvas) {
      const parent = canvas.parentElement;
      canvas.width = parent.clientWidth;
      canvas.height = parent.clientHeight;
    }

    // Payment Method Doughnut
    function drawPaymentChart() {
      const canvas = document.getElementById('paymentChart');
      if (!canvas) return;
      sizeCanvas(canvas);
      new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: ['食堂楽Pay', '社員証', '現金', 'その他'],
          datasets: [{
            data: [35, 30, 25, 10],
            backgroundColor: ['#30a1af', '#e8735a', '#f0b752', '#c4c9d0'],
            borderWidth: 2,
            borderColor: '#ffffff',
          }]
        },
        options: {
          cutout: '55%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                padding: 16,
                usePointStyle: true,
                pointStyle: 'rectRounded',
                font: { size: 17, weight: '500' },
                color: '#6b7280'
              }
            },
            datalabels: {
              display: true,
              color: '#fff',
              font: { size: 18, weight: 'bold' },
              formatter: (value) => value + '%',
            }
          }
        }
      });
    }

    // Satisfaction Trend - Line Chart
    function drawSatisfactionTrend() {
      const canvas = document.getElementById('satisfactionChart');
      if (!canvas) return;
      sizeCanvas(canvas);
      new Chart(canvas, {
        type: 'line',
        data: {
          labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
          datasets: [{
            label: '満足度',
            data: [3.5, 3.6, 3.8, 3.9, 4.0, 4.3, 4.1, 4.2, 4.0, 4.1, 4.3, 4.2],
            borderColor: '#30a1af',
            backgroundColor: function(context) {
              const chart = context.chart;
              const { ctx, chartArea } = chart;
              if (!chartArea) return 'rgba(48,161,175,0.1)';
              const grad = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
              grad.addColorStop(0, 'rgba(48, 161, 175, 0.25)');
              grad.addColorStop(1, 'rgba(48, 161, 175, 0)');
              return grad;
            },
            fill: true,
            tension: 0.4,
            borderWidth: 4,
            pointBackgroundColor: '#30a1af',
            pointRadius: 6,
            pointHoverRadius: 9,
          }]
        },
        options: {
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => '評価: ' + ctx.parsed.y.toFixed(1) + ' / 5'
              }
            }
          },
          scales: {
            y: {
              min: 1,
              max: 5,
              ticks: {
                stepSize: 1,
                color: '#9ca3af',
                font: { size: 15 }
              },
              grid: { color: '#f3f4f6' }
            },
            x: {
              ticks: { color: '#9ca3af', font: { size: 15 } },
              grid: { display: false }
            }
          }
        }
      });
    }

    window.onload = () => {
      loadHeader();
      loadSidebar('executive');
      loadChatbot();
      drawPaymentChart();
      drawSatisfactionTrend();
    };
  </script>
